name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install pytest-cov bcrypt tiktoken
    - name: Lint with ruff
      run: |
        pip install ruff
        ruff check pulse/ || true
        ruff format --check pulse/ || true
    - name: Type check with mypy
      run: |
        pip install mypy
        mypy pulse/ --ignore-missing-imports || true
    - name: Run security tests
      run: |
        python -m pytest tests/test_security.py -v --tb=short
    - name: Run all tests
      run: |
        python -m pytest tests/ -v --tb=short --ignore=tests/test_security.py || true
    - name: Run coverage
      run: |
        python -m pytest tests/ --cov=pulse --cov-report=xml --cov-report=term-missing || true

  security-audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install bandit safety pip-audit
    - name: Run bandit security scan
      run: |
        bandit -r pulse/ -ll || true
    - name: Run pip-audit
      run: |
        pip-audit || true